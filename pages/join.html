    <div class="page_agree page__outer">
        <div class="page__inner">
            <h2>회원가입에 필요한 정보를<br>

            <div class="flex-gap-10">

                    </button>
                </div>

                <div class="box-textfield">
                    <input type="number" class="textfield01" placeholder="휴대폰번호를 입력하세요">
                    <button class="btn-textfield01">실명인증</button>
                </div>

                <input type="text" class="textfield01" placeholder="닉네임을 입력하세요">
