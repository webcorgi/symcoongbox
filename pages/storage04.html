<body>
    <div class="is__bng bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div style="height:10px;"></div>
        <div class="home__products">
            <div class="head__tab other">
                <button class="btn-common02">박스함</button>
                <button class="btn-common02">상품함</button>
                <button class="btn-common02">금고함</button>
                <button class="btn-common01">선물함</button>
                <button class="btn-common02">배송내역</button>
            </div>

            <div style="height:20px"></div>

            <div class="search-wrap">
                <input type="text" class="textfield01" placeholder="검색어를 입력하세요">
                <button class="btn-search">
                    <img src="../img/icon-search.png" alt="검색">
                </button>
            </div>


            <div class="top__items">
                <div class="top__items-left">
                    <div class="btnbox-title">
                        <button class="btn-common01">받은선물</button>
                        <button class="btn-common02">보낸선물</button>
                    </div>
                </div>
                <div class="top__items-right">
                    <label class=" flexline">
                        <div class="checkbox off">
                            <input type="checkbox" name="" id="">
                            <i></i>
                        </div>
                        <span>수락대기</span>
                    </label>
                    <label class=" flexline">
                        <div class="checkbox off">
                            <input type="checkbox" name="" id="">
                            <i></i>
                        </div>
                        <span>받기완료</span>
                    </label>
                </div>
            </div>

            <div class="products__head">
                <p>
                    <span>상품</span>
                    <b>3,148</b>
                    <span>개</span>
                </p>
                <div class="btnbox-title ">
                    <button class="btn-common02 btnFixWidth">선택 삭제</button>
                    <button class="btn-common02 btnFixWidth">선택 받기</button>
                    <button class="btn-common02 btnFixWidth">선물하기</button>
                </div>
            </div>

            <div style="height:20px;"></div>

            <div class="storage02__item item-gift">
                <div class="item-head-top">
                    <p>청하님께 받은 선물</p>
                    <span>5일전</span>
                </div>
                <div class="item-head">
                    <div class="item-head-inner">
                        <label class="flexline">
                            <div class="checkbox on">
                                <input type="checkbox" name="" id="" checked="">
                                <i></i>
                            </div>
                            <div class="item-img">
                                <img src="../img/item-mini.png" alt="item">
                            </div>
                            <div class="text">
                                <h3>농심</h3>
                                <p>신라면 컵 65g, 5개</p>
                                <b class="price">5,800원</b>
                            </div>
                        </label>
                        <div class="btnbox-title">
                            <button class="btn-common02 btnFixWidth w65">수락대기</button>
                        </div>
                    </div>
                </div>
            </div>

            <div style="height:16px;"></div>

            <div class="storage02__item item-gift">
                <div class="item-head-top">
                    <p>청하님께 받은 선물</p>

                </div>
                <div class="item-head">
                    <div class="item-head-inner">
                        <label class="flexline">

                                <input type="checkbox" name="" id="" checked="">
                                <i></i>
                            </div>
                            <div class="item-img">
                                <img src="../img/item-mini.png" alt="item">
                            </div>
                            <div class="text">
                                <h3>농심</h3>
