<body>
    <div class=" bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div style="height:10px;"></div>
        <div class="products__detail">
            <img src="../img/item.png" alt="product" class="products__detail-item">
            <div class="detail__info">
                <div class="flexline">
                    <div class="detail__info-text">
                        <span>까르띠에</span>
                        <h2>LOVE 브레이슬릿</h2>
                        <b>9,700,000원</b>
                    </div>
                    <!-- <button class="btn-common02 btn-soldout">SOLD OUT</button> -->
                </div>

                <div style="height:16px;"></div>

                <div class="gauge">
                    <h2>배송게이지</h2>
                    <div class="gaugebar">
                        <div class="gaugebar-track">
                            <div class="gaugebar-fill" style="width: 50%;">
                                <div class="gauge-circle">
                                    <img src="../img/gauge-circle.png" alt="">
                                </div>
                            </div>
                        </div>
                        <b>50%</b>
                    </div>
                </div>

                <div style="height:16px"></div>

                <div class="commonbox-info">
                    <p>안내사항을 확인하세요!</p>
                    <ul>
                        <li>위 상품의 표시가격은 수요 상황에 따라 변동될 수 있는 마케팅용 참고값으로, 실제 구매에 필요한 금액을 의미하지 않습니다. 따라서 손해배상의 기준으로 적용되지
                            않습니다.
                            본 상품은 옵션이 있는 경우, 임의로 선택되어 랜덤 발송됩니다.</li>
                    </ul>
                </div>

                <div style="height:20px"></div>

                <button class="btn-common01">심쿵박스 구매하기</button>
            </div>
        </div>
    </div>
</body>
