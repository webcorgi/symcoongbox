    <title>심쿵박스</title>

    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/style.css">

    <script src="../js/script.js"></script>
    <script src="../js/swiper-bundle.min.js"></script>

<body>
    <div class="bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div style="height:10px;"></div>

        <div class="page__box">
            <div class="title-form">배송지명</div>
            <input type="text" class="textfield01" placeholder="배송지명을 입력하세요">

            <div style="height:16px;"></div>

            <div class="title-form">받는 사람</div>
            <input type="text" class="textfield01" placeholder="받는 사람을 입력하세요">

            <div style="height:16px;"></div>

            <div class="title-form">받는 주소</div>
            <div class="box-textfield">
                <input type="text" class="textfield01" placeholder="주소를 입력하세요">
                <button class="btn-textfield01">주소찾기</button>
            </div>
            <div style="height:10px;"></div>
            <input type="text" class="textfield01" placeholder="상세주소를 입력하세요">

            <div style="height:16px;"></div>
            <div class="title-form">휴대폰번호</div>
            <input type="number" class="textfield01" placeholder="휴대폰번호를 입력하세요">

            <div style="height:24px;"></div>

            <div class="title-form">공동현관 출입 방법</div>
            <div class="form-box-white">
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="access_method" checked>
                        <i></i>
                        <span>출입번호 입력</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="access_method">
                        <i></i>
                        <span>비밀번호 없이 출입 가능해요</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="access_method">
                        <i></i>
                        <span>경비실 호출</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="access_method">
                        <i></i>
                        <span>기타</span>
                    </label>
                </div>
                <input type="text" class="textfield-sub-box" placeholder="출입에 필요한 버튼을 모두 입력해주세요" readonly>
            </div>

            <label class="checkbox-item">
                <input type="checkbox">
                <i></i>
                <b>기본 배송지로 저장</b>
            </label>

            <div style="height:20px;"></div>
            <button class="btn-common01">저장하기</button>
            <div style="height:40px;"></div>
        </div>
    </div>
</body>
