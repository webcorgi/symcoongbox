<body>
    <div class="is__bng bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div style="height:10px;"></div>
        <div class="page__box page__out">
            <div class="box__buy">
                <h2>회원탈퇴 전 아래 사항을 반드시 확인해주세요.</h2>
                <ul>
                    <li>- 탈퇴 시, 보유중인 잔여 포인트는 소멸되므로 재가입을 하시더라도 소멸된 적립금은 복구되지 않습니다.</li>
                    <li>- 탈퇴 후, 재가입이 가능하나 이전 계정과 정보가 연동되지 않습니다.(포인트 내역 및 상담 내역 등)</li>
                    <li>- 삭제된 정보는 복원할 수 없으니 신중하게 선택해주세요.</li>
                    <li>- 탈퇴 시, 보관 중인 상품(랜덤박스 당첨 상품 포함)은 모두 소멸되며 복구가 불가합니다.</li>
                </ul>
            </div><!-- // box__buy -->

            <p class="out-title">아이디</p>
            <input type="text" class="textfield01" placeholder="아이디를 입력해주세요" readonly value="idididid">

            <p class="out-title">탈퇴사유</p>
            <div class="textarea-wrap">
                <textarea name="" id="textarea01" placeholder="탈퇴 사유를 입력해주세요" maxlength="400"></textarea>
                <span class="textarea-count"><em id="textarea01-count">0</em>/400</span>
            </div>



            <div style="height:20px;"></div>

            <label class="flexline label-agree">
                <div class="checkbox off">
                    <input type="checkbox" name="" id="">
                    <i></i>
                </div>
                <span>위의 회원탈퇴 유의사항을 확인하였으며 이에 동의합니다.</span>
            </label>
            <div style="height:20px;"></div>
            <button class="btn-common01">탈퇴하기</button>

            <div style="height:40px;"></div>

        </div>


        <div class="bng-wrap">

            </a>
