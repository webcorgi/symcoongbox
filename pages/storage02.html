<body>
    <div class="is__bng bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div style="height:10px;"></div>
        <div class="home__products">
            <div class="head__tab other">
                <button class="btn-common02">박스함</button>
                <button class="btn-common01">상품함</button>
                <button class="btn-common02">금고함</button>
                <button class="btn-common02">선물함</button>
                <button class="btn-common02">배송내역</button>
            </div>

            <div style="height:20px"></div>

            <div class="search-wrap">
                <input type="text" class="textfield01" placeholder="검색어를 입력하세요">
                <button class="btn-search">
                    <img src="../img/icon-search.png" alt="검색">
                </button>
            </div>

            <div class="btnbox-title other">
                <button class="btn-common01">전체</button>
                <button class="btn-common02">배송 상품</button>
                <button class="btn-common02">기프티콘</button>
                <button class="btn-common02">심쿵 체인지</button>
            </div>


            <div class="top__items">
                <div class="top__items-left">
                    <label class=" flexline">
                        <div class="checkbox off">
                            <input type="checkbox" name="" id="">
                            <i></i>
                        </div>
                        <span>전체 선택</span>
                    </label>
                </div>
                <div class="top__items-right">

                    <div class="btnbox-title">
                        <button class="btn-common02">금고함 이동</button>
                        <button class="btn-common02">배송신청</button>
                        <button class="btn-common01">환급하기</button>
                    </div>
                </div>
            </div>

            <div class="top__items">
                <div class="top__items-left">
                    <p>
                        <span>전체</span>
                        <b>3,148</b>
                        <span>개</span>
                    </p>
                </div>
                <div class="top__items-right">
                    <button class="btn-sorting">
                        <span>최근 획득 순</span>
                        <img src="../img/select02.png" alt="check">
                    </button>
                    <div class="sorting-popup">
                        <button class="active">
                            <span>최근 획득 순</span>
                            <img src="../img/icon-check-on.png" alt="check">
                        </button>
                    </div>
                </div>
            </div>
            <div style="height:20px;"></div>

            <div class="storage02__items">
                <div class="storage02__item">
                    <div class="item-soldout">
                        <div class="btn-common01 other">SOLD OUT</div>
                    </div>
                    <div class="item-head">
                        <label class="flexline">

                            <div class="checkbox on">
                                <input type="checkbox" name="" id="" checked>
                                <i></i>
                            </div>
                            <div class="item-img">
                                <img src="../img/item-mini.png" alt="item">
                            </div>
                            <div class="text">
                                <h3>농심</h3>
                                <p>신라면 컵 65g, 5개</p>
                                <b class="price">5,800원</b>
                            </div>
                        </label>
                    </div>

                    <div class="item-gauge-wrap">
                        <div class="item-gauge">
                            <span>배송 게이지</span>
                            <b>20</b>
                        </div>
                    </div>

                    <div class="item-btns">
                        <button class="btn-item">배송 신청</button>
                        <button class="btn-item">환급하기</button>
                        <button class="btn-item">잠금하기</button>
                        <button class="btn-item">선물하기</button>
                    </div>
                </div>

                <div class="storage02__item">
                    <div class="item-head">
                        <label class="flexline">
                            <div class="checkbox on">
                                <input type="checkbox" name="" id="" checked>
                                <i></i>
                            </div>
                            <div class="item-img">
                                <img src="../img/item-mini.png" alt="item">
                            </div>
                            <div class="text">
                                <h3>농심</h3>
                                <p>신라면 컵 65g, 5개</p>
                                <b class="price">5,800원</b>
                            </div>
                        </label>
                    </div>

                    <div class="item-gauge-wrap">
                        <div class="item-gauge">
                            <span>배송 게이지</span>
                            <b>20</b>
                        </div>
                    </div>

                    <div class="item-btns">
                        <button class="btn-item">배송 신청</button>
                        <button class="btn-item">환급하기</button>
                        <button class="btn-item">잠금하기</button>
                        <button class="btn-item">선물하기</button>
                    </div>
                </div>
                <div class="storage02__item">
                    <div class="item-head">
                        <label class="flexline">
                            <div class="checkbox on">
                                <input type="checkbox" name="" id="" checked>
                                <i></i>
                            </div>
                            <div class="item-img">
                                <img src="../img/item-mini.png" alt="item">
                            </div>
                            <div class="text">
                                <h3>농심</h3>
                                <p>신라면 컵 65g, 5개</p>
                                <b class="price">5,800원</b>
                            </div>
                        </label>
                    </div>

                    <div class="item-gauge-wrap">
                        <div class="item-gauge">
                            <span>배송 게이지</span>
                            <b>20</b>
                        </div>
                    </div>

                    <div class="item-btns">
                        <button class="btn-item">배송 신청</button>
                        <button class="btn-item">환급하기</button>
                        <button class="btn-item">잠금하기</button>
                        <button class="btn-item">선물하기</button>
                    </div>
                </div>
            </div>



        </div><!-- //  -->



        <div class="bng-wrap">
            <a href="./live.html">
                <img src="../img/bng_live.png" alt="라이브">
                <span>라이브</span>
            </a>
            <a href="./market.html">
                <img src="../img/bng_market.png" alt="심쿵 마켓">
                <span>심쿵 마켓</span>
            </a>
            <a href="./index.html" class="active">
                <img src="../img/bng_home.png" alt="홈">
                <span>홈</span>
            </a>
            <a href="./change.html">
                <img src="../img/bng_change.png" alt="심쿵체인지" class="anim-sway">
                <span>심쿵체인지</span>
            </a>
            <a href="./box.html">
                <img src="../img/bng_box.png" alt="보관함">
