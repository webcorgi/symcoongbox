    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/common.css">

<body>
    <div class=" bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div class="page__outer pt0">
            <div class="page__inner">
                <div class="custom-select-wrap">
                    <button class="custom-select-trigger" type="button">
                        <span>문의타입 선택</span>
                        <img src="../img/select.png" alt="화살표">
                    </button>
                    <ul class="custom-options">
                        <li data-value="구매한 박스 문의">구매한 박스 문의</li>
                        <li data-value="배송 문의">배송 문의</li>
                        <li data-value="결제 문의">결제 문의</li>
                        <li data-value="포인트 전환 문의">포인트 전환 문의</li>
                        <li data-value="그 밖의 문의">그 밖의 문의</li>
                    </ul>
                    <input type="hidden" name="inquiry_type" id="inquiry_type_val">
                </div>

                <div style="height:10px"></div>

                <input type="text" class="textfield01" placeholder="제목을 입력해주세요">

                <div style="height:10px"></div>

                <div class="textarea-wrap ">
                    <textarea name="" id="textarea01" placeholder="내용을 입력하세요" maxlength="400"></textarea>
                    <span class="textarea-count"><em id="textarea01-count">0</em>/400</span>
                </div>

                <div style="height:10px"></div>

                <label class="upload-wrap">
                    <input type="file" class="textfield01" placeholder="파일 첨부">
                    <span>파일 첨부</span>
                    <img src="../img/icon-etc-upload.png" alt="파일 첨부">
                </label>

                <div class="upload-info">
                    <span>kakaotalk_setup_exe(8,391k)</span>
                    <button>
                        <img src="../img/icon-x-black.png" alt="x">
                    </button>
                </div>

            </div><!-- //page__inner -->
            <button class="btn-common01">문의하기</button>
        </div><!-- //page__outer -->

    </div>
</body>
