<body>
    <div class=" bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div style="height:10px;"></div>
        <div class="home__products faq-products">
            <div class="head__tab other">
                <button class="btn-common01 active">자주묻는질문</button>
                <button class="btn-common02">1:1문의</button>
                <button class="btn-common02">공지사항</button>
            </div>

            <div class="faq-list">
                <div class="faq-item active">
                    <div class="faq-q">
                        <span><b>Q.</b> 포인트 획득은 어떻게 할까요?</span>
                        <img src="../img/icon-arrow-top.png" alt="arrow" class="faq-arrow">
                    </div>
                    <div class="faq-a" style="display: block;">
                        <p>포인트 획득은 이벤트, 합성하기 등의 참여를 통해 획득할 수 있습니다.</p>
                    </div>
                </div>

                <div class="faq-item">
                    <div class="faq-q">
                        <span><b>Q.</b> 배송 추적 결과 배송 완료라고 나오는데 수령을 못한 경우 어떻게 할까요?</span>
                        <img src="../img/icon-arrow-btm.png" alt="arrow" class="faq-arrow">
                    </div>
                    <div class="faq-a">
                        <p>경비실 또는 무인택배함 등에 보관되어 있는지 확인 부탁드립니다. 확인 후에도 제품을 수령하지 못하신 경우 고객센터로 문의 부탁드립니다.</p>
                    </div>
                </div>

                <div class="faq-item">
                    <div class="faq-q">
                        <span><b>Q.</b> 회원 탈퇴는 어떻게 하나요?</span>
                        <img src="../img/icon-arrow-btm.png" alt="arrow" class="faq-arrow">
                    </div>
                    <div class="faq-a">
                        <p>마이페이지 > 회원정보 수정 하단에서 회원 탈퇴를 진행하실 수 있습니다. 탈퇴 시 보유하신 포인트 및 주문 내역이 모두 삭제되니 주의 바랍니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
