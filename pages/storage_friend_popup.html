    <div class="bg-pink">
        <div class="popup popup-nickname" style="display: flex;">

            <div class="commonbox-wrap">
                <div class="commonbox-header">
                    <h2>친구 추가</h2>
                    <button class="btn-close">
                        <img src="../img/icon-x.png" alt="x">
                    </button>
                </div>
                <div class="commonbox-body">
                    <input type="text" class="textfield01" placeholder="추가할 친구의 닉네임을 입력하세요">

            </div>
        </header>
        <div class="page__outer">

                <div class="head__tab other">
                    <button class="btn-common02">등록한 친구</button>

                    <button class="btn-search">
                        <img src="../img/icon-search.png" alt="검색">
                    </button>
                </div>

                <div class="top__items">
                    <div class="top__items-left">
                        <p>

                    </div>
                    <div class="top__items-right">
                        <button class="btn-sorting">
                            <span>최신순</span>
                            <img src="../img/select02.png" alt="check">
                        </button>
                    </div>
                </div>

                <div style="height:16px"></div>

                <div class="personbox">
                    <img src="../img/icon-person.png" alt="">
                    <div class="personbox-text">
