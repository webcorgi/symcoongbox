<body>
    <div class="bg-pink">
        <header class="header-home">
            <div class="header-home-left">
                <button>MENU</button>
                <button>GAME</button>
            </div>
            <div class="header-home-right">
                <img src="../img/icon-heart-box-yellow.png" alt="heart box" class="anim-heartbeat">
                <p>박스 구매</p>
            </div>
        </header>
        <div class="page__outer">
            <div class="page__inner">

                <div class="alarm__msg">
                    <img src="../img/icon-etc-1.png" alt="알림없음">
                    <span>쿠폰은 유효기간 경과 후 자동 소멸됩니다.</span>
                </div>

                <div class="top__items">
                    <div class="top__items-left">
                        <p>
                            <span>쿠폰</span>
                            <b>4</b>
                            <span>개</span>
                        </p>
                    </div>
                    <div class="top__items-right">
                        <div class="btnbox-title">
                            <button class="btn-common01">선택 삭제</button>
                        </div>
                    </div>
                </div>

                <div style="height:16px;"></div>

                <div class="storage__items coupon couponbox">
                    <div class="storage__item">
                        <label class="flexline">
                            <div class="checkbox off">
                                <input type="checkbox" name="" id="">
                                <i></i>
                            </div>
                            <div class="storage__item-text">
                                <span>5,000박스 오픈 기념 할인쿠폰 (2,000원 할인)</span>
                            </div>
                        </label>
                        <button>
                            <img src="../img/icon-circle-check.png" alt="check icon">
                        </button>
                    </div>

                    <div class="storage__item">
                        <label class="flexline">
                            <div class="checkbox off">
                                <input type="checkbox" name="" id="">
                                <i></i>
                            </div>
                            <div class="storage__item-text">
                                <span>심쿵박스 5,000원 할인쿠폰 (5,000원 할인)</span>
                                <p>유효기간 : 2026-02-11</p>
                                <b>만료된 쿠폰</b>
                            </div>
                        </label>
                        <button>
                            <img src="../img/icon-download.png" alt="download icon">
                        </button>
                    </div>

                    <div class="storage__item">
                        <label class="flexline">
                            <div class="checkbox off">
                                <input type="checkbox" name="" id="">
                                <i></i>
                            </div>
                            <div class="storage__item-text">
                                <span>10% 할인쿠폰 (10% 할인 최대 20,000원)</span>
                                <p>유효기간 : 2026-02-11</p>
                                <b>만료된 쿠폰</b>
                            </div>
                        </label>
                        <button>
                            <img src="../img/icon-download.png" alt="download icon">
                        </button>
                    </div>
                </div>

            <button class="btn-common01">시리얼 쿠폰 등록하기</button>
